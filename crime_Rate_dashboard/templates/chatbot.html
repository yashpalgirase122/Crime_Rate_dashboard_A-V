<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crime Dashboard - Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">Crime AI</div>
            <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('chatbot') }}" class="nav-link active">AI Chatbot</a>
            {% if session.role == 'admin' %}
            <a href="{{ url_for('admin') }}" class="nav-link" style="color:var(--warning)">Admin Panel</a>
            {% endif %}
            <div style="margin-top:auto"></div>
            <a href="{{ url_for('logout') }}" class="nav-link" style="color:var(--danger)">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1>AI Crime Assistant</h1>
            </div>

            <div class="chart-container" style="max-width: 800px; margin: 0 auto;">
                <div class="chart-header">Chat with Data</div>
                <div class="chat-window">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message msg-bot">Hello! I am your AI Crime Assistant. Try asking me "Which city has highest crime?", "Which crime is most common?", or "Which year had highest crime?".</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="form-control" placeholder="Type your question here...">
                    <button class="btn btn-primary" style="width: 100px;" onclick="sendMessage()">Send</button>
                </div>
            </div>
            
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>
</html>
