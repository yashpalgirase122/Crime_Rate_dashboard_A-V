<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crime Dashboard - Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p style="color: var(--text-secondary); margin-top: 5px;">Enter email to receive OTP</p>
            </div>
            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                </div>
                <!-- Mock OTP field -->
                <div class="form-group" style="display:none;" id="otpField">
                    <input type="text" name="otp" class="form-control" placeholder="Enter OTP">
                </div>
                <button type="submit" class="btn btn-primary" onclick="document.getElementById('otpField').style.display='block';">Send OTP</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="{{ url_for('login') }}" style="color: var(--text-secondary); text-decoration: none;">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
